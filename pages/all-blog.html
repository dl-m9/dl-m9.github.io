<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var l = localStorage.getItem('siteLang');
                if (l === 'zh' || l === 'en') document.documentElement.setAttribute('lang', l);
            } catch (e) { /* ignore */ }
        })();
    </script>
    <title>All Blogs - Senkang Forest Hu</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container">
            <ul class="nav-links">
                <li><a href="../index.html"><span data-lang="en">Home</span><span data-lang="zh">主页</span></a></li>
                <li><a href="#" class="active"><span data-lang="en">All Blogs</span><span data-lang="zh">全部博客</span></a></li>
            </ul>
            <button type="button" class="lang-toggle" aria-label="Switch language / 切换语言">
                <span class="lt-en">EN</span><span class="lt-sep" aria-hidden="true">/</span><span class="lt-cn">CN</span>
            </button>
        </div>
    </nav>

    <header>
        <div class="container">
            <div class="header-content">
                <div class="profile-info">
                    <!-- Profile info will be loaded from JSON -->
                </div>
                <div class="profile-image">
                    <img src="../assets/profile.jpg" alt="Senkang Hu" id="profile-img">
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="all-blogs" class="section">
            <div class="container">
                <h2 class="section-title"><span data-lang="en">All Blogs & Notes</span><span data-lang="zh">全部博客与笔记</span></h2>
                <div class="filter-container blog-filter-container">
                    <div class="filter-group">
                        <button class="filter-btn blog-year-filter-btn active" data-blog-year="all"><span data-lang="en">All</span><span data-lang="zh">全部</span></button>
                        <button class="filter-btn blog-year-filter-btn" data-blog-year="2026">2026</button>
                        <button class="filter-btn blog-year-filter-btn" data-blog-year="2025">2025</button>
                        <button class="filter-btn blog-year-filter-btn" data-blog-year="2024">2024</button>
                    </div>
                </div>
                <div id="all-blog-container" class="blog-grid">
                    <!-- Blog notes will be dynamically loaded here from blogs.json -->
                </div>
                <div class="back-to-home">
                    <a href="../index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> <span data-lang="en">Back to Homepage</span><span data-lang="zh">返回主页</span></a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; <span id="copyright-year"></span> Senkang Forest Hu. <span data-lang="en">All rights reserved.</span><span data-lang="zh">版权所有。</span></p>
        </div>
    </footer>

    <script>
        document.getElementById('copyright-year').textContent = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', function() {
            const navLinks = document.querySelector('.nav-links');
            if (navLinks) {
                const checkScrollable = () => {
                    const isScrollable = navLinks.scrollWidth > navLinks.clientWidth;
                    document.querySelector('nav .container').classList.toggle('has-scroll', isScrollable);
                };

                checkScrollable();
                window.addEventListener('resize', checkScrollable);
            }
        });
    </script>
    <script src="../script.js?v=20260504-1"></script>
</body>
</html>
