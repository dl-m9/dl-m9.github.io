<!-- Password Protection Script -->
<script>
    // Execute immediately and when DOM is ready
    (function() {
      // Check if user has already been authenticated
      if (localStorage.getItem('passwordAccepted') !== 'true') {
        // Create function to set up password protection
        function setupPasswordProtection() {
          // Create password protection overlay
          var overlay = document.createElement('div');
          overlay.id = 'password-overlay';
          overlay.style.position = 'fixed';
          overlay.style.top = '0';
          overlay.style.left = '0';
          overlay.style.width = '100%';
          overlay.style.height = '100%';
          overlay.style.backgroundColor = 'white';
          overlay.style.zIndex = '9999';
          overlay.style.display = 'flex';
          overlay.style.flexDirection = 'column';
          overlay.style.justifyContent = 'center';
          overlay.style.alignItems = 'center';
          
          // Create password input interface
          var content = document.createElement('div');
          content.innerHTML = `
            <h2>Please enter password to access the website</h2>
            <input type="password" id="password-input" style="margin: 10px; padding: 8px;">
            <button id="submit-password" style="padding: 8px 16px;">Submit</button>
          `;
          overlay.appendChild(content);
          document.body.appendChild(overlay);
          
          // Set up password verification
          document.getElementById('submit-password').addEventListener('click', checkPassword);
          document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
              checkPassword();
            }
          });
        }
        
        function checkPassword() {
          var password = document.getElementById('password-input').value;
          // Set your password here
          if (password === '8888') {
            localStorage.setItem('passwordAccepted', 'true');
            document.getElementById('password-overlay').style.display = 'none';
          } else {
            alert('Incorrect password, please try again!');
          }
        }
        
        // Try both methods to ensure it runs
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', setupPasswordProtection);
        } else {
          // DOM already loaded, run now
          setupPasswordProtection();
        }
      }
    })();
</script>
